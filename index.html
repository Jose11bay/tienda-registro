<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>✨ NAMORE · Ventas Hermosas ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #fff5f8 0%, #ffe0e8 100%);
      font-family: 'Quicksand', sans-serif;
      padding: 20px;
    }
    .glass-container {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(3px);
      border-radius: 48px;
      box-shadow: 0 25px 45px rgba(255, 77, 136, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
      padding: 30px;
      animation: fadeSlideUp 0.6s ease-out;
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .hero-title { text-align: center; margin-bottom: 30px; }
    .namore-glam {
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff2e6e, #ff85b3, #ffc2d9);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 5px;
      animation: shine 3s infinite alternate;
    }
    @keyframes shine { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    .sub-lema { font-size: 1.1rem; font-weight: 500; color: #b34e71; background: rgba(255, 245, 240, 0.7); display: inline-block; padding: 6px 20px; border-radius: 60px; margin-top: 8px; }
    .chiguagua-love { background: #ffecf0; border-radius: 100px; padding: 10px 25px; display: inline-flex; align-items: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
    .chiguagua-love span { font-size: 2rem; animation: bounce 1.5s infinite; display: inline-block; }
    @keyframes bounce { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-5px);} }
    .chiguagua-text { font-weight: 700; color: #c95a7a; background: white; border-radius: 60px; padding: 5px 15px; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 0.9fr; gap: 30px; margin-top: 25px; }
    @media (max-width: 800px) { .dashboard-grid { grid-template-columns: 1fr; } .namore-glam { font-size: 3rem; } }
    .card {
      background: white;
      border-radius: 32px;
      padding: 22px 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      border: 1px solid rgba(255, 180, 200, 0.5);
      animation: fadeSlideUp 0.5s ease-out backwards;
    }
    .card h3 { font-size: 1.6rem; color: #ff4d88; margin-bottom: 20px; font-weight: 700; border-left: 6px solid #ff99bb; padding-left: 15px; }
    .form-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; }
    .form-grid input, .form-grid select { flex: 1 1 160px; padding: 12px 16px; border-radius: 60px; border: 1px solid #ffcddb; background: #fffbfd; font-family: 'Quicksand', sans-serif; font-weight: 500; }
    .form-grid input:focus, .form-grid select:focus { outline: none; border-color: #ff4d88; box-shadow: 0 0 0 3px rgba(255,77,136,0.2); }
    .btn-primary, .btn-secondary { transition: transform 0.2s ease; cursor: pointer; }
    .btn-primary { background: #ff4d88; border: none; color: white; padding: 12px 28px; border-radius: 60px; font-weight: bold; box-shadow: 0 6px 14px rgba(255, 77, 136, 0.3); }
    .btn-primary:hover { background: #e63e74; transform: scale(1.05); }
    .btn-secondary { background: #ffb7cb; color: #5a2e3e; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; }
    .btn-secondary:hover { background: #ff9bb5; transform: scale(1.05); }
    .ventas-list { max-height: 380px; overflow-y: auto; padding-right: 5px; }
    .venta-item { background: #fffafc; border-radius: 24px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border: 1px solid #ffe2ec; }
    .venta-info { flex: 3; font-size: 0.9rem; }
    .observacion-text { font-size: 0.75rem; color: #b3567a; background: #fff0f4; display: inline-block; padding: 2px 8px; border-radius: 40px; margin-top: 4px; }
    .venta-img-preview { width: 48px; height: 48px; border-radius: 20px; object-fit: cover; margin-left: 10px; border: 2px solid white; }
    .action-buttons { display: flex; align-items: center; gap: 5px; }
    .edit-btn, .delete-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    .edit-btn { color: #ffaa66; }
    .delete-btn { color: #ff99b5; }
    .total-resumen { background: #fff0f4; border-radius: 28px; padding: 18px; margin-top: 20px; text-align: center; }
    canvas#ventasChart { max-height: 220px; width: 100%; }
    .action-group { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
    footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #c07f98; }
    .badge-chi { background: #ffdce6; border-radius: 60px; padding: 2px 12px; font-size: 0.75rem; display: inline-block; }

    /* Historial */
    .historial-container { margin-top: 25px; border-top: 2px dashed #ffc2d4; padding-top: 20px; }
    .historial-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
    .filtros { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filtros input, .filtros button { padding: 8px 16px; border-radius: 40px; border: 1px solid #ffcddb; background: white; }
    .historial-lista { max-height: 500px; overflow-y: auto; }
    .cierre-item { background: #fff5f7; border-radius: 28px; margin-bottom: 16px; border: 1px solid #ffe2ec; }
    .cierre-header { background: #ffe3ec; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: 28px; }
    .cierre-header:hover { background: #ffd6e4; }
    .cierre-fecha { font-weight: bold; color: #c95a7a; font-size: 1.1rem; }
    .cierre-total { font-weight: bold; color: #ff4d88; }
    .cierre-cantidad { color: #b3567a; font-size: 0.85rem; margin-left: 10px; }
    .delete-cierre-btn { background: none; border: none; color: #ff99b5; font-size: 1.2rem; cursor: pointer; margin-left: 12px; }
    .delete-cierre-btn:hover { color: #e63e74; transform: scale(1.1); }
    .cierre-ventas { padding: 0 12px; max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.2s; background: white; border-radius: 0 0 28px 28px; }
    .cierre-ventas.mostrar { max-height: 2000px; opacity: 1; padding: 12px; }
    .historial-venta-item { background: #fffafc; border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; border: 1px solid #ffe2ec; }
    .historial-venta-info { flex: 1; font-size: 0.85rem; }
    .toggle-icon { transition: transform 0.3s ease; }
    .rotated { transform: rotate(180deg); }
    .no-data { text-align: center; padding: 30px; color: #b97f98; }

    /* Modal Calculadora */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 48px;
      padding: 25px;
      width: 320px;
      box-shadow: 0 20px 40px rgba(255,77,136,0.3);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { color: #ff4d88; margin: 0; }
    .close-modal { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #ff99b5; }
    .calc-display { background: #fff0f4; padding: 20px; text-align: right; font-size: 2rem; border-radius: 32px; margin-bottom: 20px; font-weight: bold; color: #5a2e3e; min-height: 80px; word-break: break-word; }
    .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .calc-btn { background: #ffe3ec; border: none; padding: 15px; font-size: 1.3rem; border-radius: 60px; cursor: pointer; font-weight: bold; color: #b34e71; }
    .calc-equal { background: #ff4d88; color: white; }
    .calc-clear { background: #ffb7cb; color: #5a2e3e; }
  </style>
</head>
<body>
<div class="glass-container">
  <div class="hero-title">
    <div class="namore-glam">NĀMORE</div>
    <div class="sub-lema"><i class="fas fa-heart"></i> elegancia & pasión <i class="fas fa-heart"></i></div>
    <div class="chiguagua-love">
      <span>🐶</span><span>🐕</span><span>✨</span>
      <span class="chiguagua-text"><i class="fas fa-paw"></i> CLIENTES FELICES <i class="fas fa-paw"></i></span>
      <span>🐾</span><span>❤️</span><span>🐶</span>
    </div>
  </div>
  <div class="dashboard-grid">
    <div class="card">
      <h3><i class="fas fa-cart-plus"></i> Registrar venta</h3>
      <div class="form-grid">
        <input type="text" id="producto" placeholder="✨ Producto ✨" autocomplete="off">
        <select id="marca"><option>NAMORE</option><option>LUTY</option><option>MONICA</option><option>ADELA</option></select>
        <input type="number" id="precio" placeholder="S/ Precio" step="0.01">
        <select id="pago"><option>Yape</option><option>Efectivo</option><option>Tarjeta</option></select>
        <div style="display: flex; gap: 8px; align-items: center;">
          <label for="foto" class="btn-secondary" style="cursor:pointer; padding:10px 18px;"><i class="fas fa-camera"></i> Foto</label>
          <input type="file" id="foto" accept="image/*" style="display:none;">
          <span id="nombreFoto" style="font-size:0.7rem; color:#b95a7a;">ninguna</span>
        </div>
        <button class="btn-primary" onclick="agregarVenta()"><i class="fas fa-plus-circle"></i> Agregar venta</button>
      </div>
      <h3><i class="fas fa-list-ul"></i> Últimas ventas</h3>
      <div class="ventas-list"><ul id="lista" style="list-style: none;"></ul></div>
      <div class="total-resumen" id="totalResumen"></div>
      <div class="action-group">
        <button class="btn-secondary" onclick="borrarTodo()"><i class="fas fa-trash-alt"></i> Limpiar todo</button>
        <button class="btn-primary" onclick="cerrarTienda()"><i class="fas fa-store"></i> Cerrar tienda</button>
        <button class="btn-primary" onclick="toggleHistorial()"><i class="fas fa-history"></i> Historial</button>
        <button class="btn-primary" onclick="abrirCalculadora()"><i class="fas fa-calculator"></i> Calculadora</button>
        <button class="btn-primary" onclick="generarPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
      </div>
    </div>
    <div class="card">
      <h3><i class="fas fa-chart-pie"></i> Resumen dulce</h3>
      <canvas id="ventasChart" width="400" height="200"></canvas>
      <div id="statsDetalle" style="font-size:0.9rem; background:#fef6f9; border-radius: 28px; padding: 15px; margin-top: 15px;"></div>
      <hr style="margin: 20px 0; border-color:#ffd9e3;">
      <div style="display: flex; justify-content: space-between; flex-wrap:wrap;">
        <div><i class="fas fa-dog"></i> Chiguaguas crew 🐾</div>
        <div><i class="fas fa-music"></i> <span id="fraseBonita">"Brilla como NAMORE"</span></div>
        <div><i class="fas fa-calendar-alt"></i> <span id="fechaHoy"></span></div>
      </div>
    </div>
  </div>
  <div id="historialPanel" style="display: none;" class="historial-container">
    <div class="historial-header">
      <h3 style="color:#ff4d88;"><i class="fas fa-archive"></i> Historial de cierres</h3>
      <div class="filtros">
        <input type="date" id="filtroFecha">
        <button class="btn-secondary" onclick="filtrarHistorial()"><i class="fas fa-filter"></i> Filtrar</button>
        <button class="btn-secondary" onclick="resetFiltroHistorial()"><i class="fas fa-eye"></i> Ver todo</button>
      </div>
    </div>
    <div id="historialLista" class="historial-lista"></div>
  </div>
  <footer><i class="fas fa-heart"></i> NAMORE · Cada venta es un latido · con cariño y chiguaguas <i class="fas fa-heart"></i></footer>
</div>

<!-- Modal Calculadora -->
<div id="calcModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-calculator"></i> Calculadora NAMORE</h3>
      <button class="close-modal" onclick="cerrarCalculadora()">&times;</button>
    </div>
    <div class="calc-display" id="calcDisplay">0</div>
    <div class="calc-buttons">
      <button class="calc-btn" onclick="calcInput('7')">7</button>
      <button class="calc-btn" onclick="calcInput('8')">8</button>
      <button class="calc-btn" onclick="calcInput('9')">9</button>
      <button class="calc-btn" onclick="calcInput('/')">/</button>
      <button class="calc-btn" onclick="calcInput('4')">4</button>
      <button class="calc-btn" onclick="calcInput('5')">5</button>
      <button class="calc-btn" onclick="calcInput('6')">6</button>
      <button class="calc-btn" onclick="calcInput('*')">*</button>
      <button class="calc-btn" onclick="calcInput('1')">1</button>
      <button class="calc-btn" onclick="calcInput('2')">2</button>
      <button class="calc-btn" onclick="calcInput('3')">3</button>
      <button class="calc-btn" onclick="calcInput('-')">-</button>
      <button class="calc-btn" onclick="calcInput('0')">0</button>
      <button class="calc-btn" onclick="calcInput('.')">.</button>
      <button class="calc-btn calc-equal" onclick="calcResult()">=</button>
      <button class="calc-btn calc-clear" onclick="calcClear()">C</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAF151DXqJ0wakbjm-bIvii8FszAn5C1sE",
    authDomain: "tienda-registro.firebaseapp.com",
    projectId: "tienda-registro",
    storageBucket: "tienda-registro.firebasestorage.app",
    messagingSenderId: "758569170962",
    appId: "1:758569170962:web:71dd645f5aee29f19340cb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let ventas = [];
  let allCierres = [];
  let historialVisible = false;
  let chartInstance = null;

  // ========== FECHA LOCAL PERÚ ==========
  function getPeruDateYYYYMMDD() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Lima' });
  }
  function getPeruDateVisible() {
    return new Date().toLocaleDateString('es-PE', { timeZone: 'America/Lima', year: 'numeric', month: 'long', day: 'numeric' });
  }

  // ========== VENTAS CRUD ==========
  async function cargarVentas() {
    const snap = await getDocs(collection(db, "ventas"));
    ventas = [];
    snap.forEach(d => ventas.push({ id: d.id, ...d.data() }));
    ventas.sort((a,b) => (b.fechaReal || 0) - (a.fechaReal || 0));
    mostrarVentas();
    actualizarResumen();
  }

  async function guardarVenta(producto, marca, precio, pago, fechaVisible, imagenData) {
    const nueva = {
      producto, marca, precio, pago,
      fecha: fechaVisible,
      fechaReal: Date.now(),
      imagen: imagenData || null,
      observaciones: "",
      timestamp: new Date().toISOString()
    };
    const docRef = await addDoc(collection(db, "ventas"), nueva);
    ventas.unshift({ id: docRef.id, ...nueva });
    mostrarVentas();
    actualizarResumen();
  }

  async function eliminarVenta(id) {
    if (!confirm("¿Eliminar esta venta?")) return;
    await deleteDoc(doc(db, "ventas", id));
    ventas = ventas.filter(v => v.id !== id);
    mostrarVentas();
    actualizarResumen();
  }

  async function editarObservaciones(id, obsActual) {
    const nueva = prompt("Observación:", obsActual || "");
    if (nueva !== null) {
      await updateDoc(doc(db, "ventas", id), { observaciones: nueva.trim() });
      const v = ventas.find(v => v.id === id);
      if (v) v.observaciones = nueva.trim();
      mostrarVentas();
      actualizarResumen();
    }
  }

  async function borrarTodo() {
    if (!confirm("⚠️ Eliminar TODAS las ventas actuales?")) return;
    for (const v of ventas) await deleteDoc(doc(db, "ventas", v.id));
    ventas = [];
    mostrarVentas();
    actualizarResumen();
  }

  // ========== CERRAR TIENDA ==========
  async function cerrarTienda() {
    if (ventas.length === 0) { alert("No hay ventas para cerrar."); return; }
    const total = ventas.reduce((s, v) => s + v.precio, 0);
    const fechaLocal = getPeruDateYYYYMMDD();
    const fechaVisible = getPeruDateVisible();
    const cierre = {
      fecha: fechaLocal,
      fechaVisible: fechaVisible,
      fechaReal: Date.now(),
      total: total,
      ventas: ventas.map(v => ({ ...v })),
      cantidadVentas: ventas.length,
      timestamp: new Date().toISOString()
    };
    await addDoc(collection(db, "cierres"), cierre);
    for (const v of ventas) await deleteDoc(doc(db, "ventas", v.id));
    ventas = [];
    mostrarVentas();
    actualizarResumen();
    alert("✅ Día cerrado correctamente.");
    if (historialVisible) cargarHistorial();
  }

  // ========== UI VENTAS ==========
  function agregarVenta() {
    const producto = document.getElementById("producto").value.trim();
    const marca = document.getElementById("marca").value;
    let precio = parseFloat(document.getElementById("precio").value);
    const pago = document.getElementById("pago").value;
    const archivo = document.getElementById("foto").files[0];
    const fechaVisible = getPeruDateVisible();
    if (!producto) { alert("Producto vacío"); return; }
    if (isNaN(precio) || precio <= 0) { alert("Precio válido"); return; }
    precio = parseFloat(precio.toFixed(2));
    if (archivo) {
      const reader = new FileReader();
      reader.onload = e => guardarVenta(producto, marca, precio, pago, fechaVisible, e.target.result);
      reader.readAsDataURL(archivo);
    } else {
      guardarVenta(producto, marca, precio, pago, fechaVisible, null);
    }
    document.getElementById("producto").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("foto").value = "";
    document.getElementById("nombreFoto").innerText = "ninguna";
  }

  function mostrarVentas() {
    const ul = document.getElementById("lista");
    ul.innerHTML = "";
    if (ventas.length === 0) {
      ul.innerHTML = "<li style='text-align:center; padding:20px;'><i class='fas fa-paw'></i> Aún no hay ventas… 🐶</li>";
      return;
    }
    ventas.forEach(v => {
      const li = document.createElement("li");
      li.className = "venta-item";
      const obsHtml = v.observaciones ? `<div class="observacion-text"><i class="fas fa-pencil-alt"></i> ${escapeHtml(v.observaciones)}</div>` : '';
      li.innerHTML = `
        <div class="venta-info">
          <strong>${v.fecha}</strong> · ${v.producto} · ${v.marca}<br>
          <span class="badge-chi">S/ ${v.precio}</span> · ${v.pago}
          ${obsHtml}
        </div>
        <div class="action-buttons">
          ${v.imagen ? `<img src="${v.imagen}" class="venta-img-preview" alt="foto">` : '<i class="fas fa-camera" style="color:#ffb7cb;"></i>'}
          <button class="edit-btn" data-id="${v.id}" data-obs="${escapeAttr(v.observaciones)}"><i class="fas fa-edit"></i></button>
          <button class="delete-btn" data-id="${v.id}"><i class="fas fa-trash-alt"></i></button>
        </div>
      `;
      ul.appendChild(li);
    });
    document.querySelectorAll(".edit-btn").forEach(btn => btn.addEventListener("click", (e) => {
      e.stopPropagation();
      editarObservaciones(btn.dataset.id, btn.dataset.obs);
    }));
    document.querySelectorAll(".delete-btn").forEach(btn => btn.addEventListener("click", (e) => {
      e.stopPropagation();
      eliminarVenta(btn.dataset.id);
    }));
  }

  function actualizarResumen() {
    let total = 0, yape = 0, efectivo = 0, tarjeta = 0;
    ventas.forEach(v => {
      total += v.precio;
      if (v.pago === "Yape") yape += v.precio;
      else if (v.pago === "Efectivo") efectivo += v.precio;
      else tarjeta += v.precio;
    });
    document.getElementById("totalResumen").innerHTML = `
      <p><strong>Total general:</strong> S/ ${total.toFixed(2)}</p>
      <p>Yape: S/ ${yape.toFixed(2)} &nbsp; Efectivo: S/ ${efectivo.toFixed(2)} &nbsp; Tarjeta: S/ ${tarjeta.toFixed(2)}</p>
      <p>Total ventas: ${ventas.length}</p>`;
    
    const marcas = {};
    ventas.forEach(v => marcas[v.marca] = (marcas[v.marca] || 0) + v.precio);
    const topMarca = Object.entries(marcas).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById("statsDetalle").innerHTML = `
      <i class="fas fa-trophy"></i> <strong>Marca estrella:</strong> ${topMarca ? `${topMarca[0]} · S/ ${topMarca[1].toFixed(2)}` : "—"}<br>
      <i class="fas fa-chart-simple"></i> Promedio: S/ ${ventas.length ? (total/ventas.length).toFixed(2) : 0}`;
    
    const ctx = document.getElementById('ventasChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: ['Yape', 'Efectivo', 'Tarjeta'], datasets: [{ data: [yape, efectivo, tarjeta], backgroundColor: ['#ff7aa2', '#ffb347', '#9b59b6'], borderWidth: 0 }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: (ctx) => ` S/ ${ctx.raw.toFixed(2)}` } } } }
    });
  }

  function generarPDF() {
    if (ventas.length === 0) { alert("Sin ventas"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFillColor(255,240,245); doc.rect(0,0,210,297,'F');
    doc.setFont("helvetica","bold"); doc.setFontSize(28); doc.setTextColor(255,77,136);
    doc.text("NAMORE",105,25,{align:"center"});
    doc.setFontSize(12); doc.setTextColor(180,80,110);
    doc.text("Elegancia y pasión",105,35,{align:"center"});
    doc.setFontSize(9); doc.text("Reporte de Ventas - "+getPeruDateVisible(),105,45,{align:"center"});
    doc.setDrawColor(255,170,200); doc.line(20,52,190,52);
    const colX=[20,55,95,135,160]; let y=65;
    doc.setFillColor(255,220,230); doc.rect(colX[0]-1,y-5,190-(colX[0]-1),7,'F');
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(200,60,100);
    doc.text("Fecha",colX[0],y); doc.text("Producto",colX[1],y); doc.text("Marca",colX[2],y); doc.text("Precio",colX[3],y); doc.text("Pago",colX[4],y);
    y+=6; doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
    let total=0;
    for(const v of ventas){
      total+=v.precio;
      doc.text(v.fecha || '',colX[0],y);
      let prod=v.producto.length>18?v.producto.slice(0,15)+"...":v.producto;
      doc.text(prod,colX[1],y); doc.text(v.marca,colX[2],y);
      doc.text(`S/ ${v.precio.toFixed(2)}`,colX[3],y); doc.text(v.pago,colX[4],y);
      y+=6;
    }
    y+=8; doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(255,77,136);
    doc.text(`TOTAL: S/ ${total.toFixed(2)}`,20,y);
    doc.save("Namore_ventas.pdf");
  }

  // ========== HISTORIAL CON ELIMINACIÓN INDIVIDUAL ==========
  async function cargarHistorial() {
    const snap = await getDocs(collection(db, "cierres"));
    allCierres = [];
    snap.forEach(d => allCierres.push({ id: d.id, ...d.data() }));
    allCierres.sort((a,b) => (b.fechaReal || 0) - (a.fechaReal || 0));
    aplicarFiltro();
  }

  function aplicarFiltro() {
    const filtro = document.getElementById("filtroFecha").value;
    let cierresMostrar = [...allCierres];
    if (filtro) cierresMostrar = cierresMostrar.filter(c => c.fecha === filtro);
    renderHistorial(cierresMostrar);
  }

  function renderHistorial(cierres) {
    const cont = document.getElementById("historialLista");
    cont.innerHTML = "";
    if (cierres.length === 0) { cont.innerHTML = '<div class="no-data">No hay cierres registrados</div>'; return; }
    cierres.forEach(cierre => {
      let fechaDisplay = cierre.fechaVisible;
      if (!fechaDisplay) {
        const partes = cierre.fecha.split('-');
        if (partes.length === 3) {
          const fechaObj = new Date(Date.UTC(partes[0], partes[1]-1, partes[2]));
          fechaDisplay = fechaObj.toLocaleDateString('es-PE', { year:'numeric', month:'long', day:'numeric' });
        } else fechaDisplay = cierre.fecha;
      }
      const div = document.createElement("div");
      div.className = "cierre-item";
      div.innerHTML = `
        <div class="cierre-header">
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <span class="cierre-fecha"><i class="fas fa-calendar-alt"></i> ${fechaDisplay}</span>
            <span class="cierre-cantidad">(${cierre.cantidadVentas} ventas)</span>
            <button class="delete-cierre-btn" data-id="${cierre.id}" title="Eliminar cierre"><i class="fas fa-trash-alt"></i></button>
          </div>
          <div><span class="cierre-total">S/ ${cierre.total.toFixed(2)}</span> <i class="fas fa-chevron-down toggle-icon"></i></div>
        </div>
        <div class="cierre-ventas"></div>
      `;
      const ventasDiv = div.querySelector(".cierre-ventas");
      const header = div.querySelector(".cierre-header");
      const icon = header.querySelector(".toggle-icon");
      const deleteBtn = div.querySelector(".delete-cierre-btn");
      if (cierre.ventas && cierre.ventas.length) {
        cierre.ventas.forEach(v => {
          const item = document.createElement("div");
          item.className = "historial-venta-item";
          const obsHtml = v.observaciones ? `<div class="observacion-text" style="margin-top:4px;"><i class="fas fa-pencil-alt"></i> ${escapeHtml(v.observaciones)}</div>` : '';
          item.innerHTML = `
            <div class="historial-venta-info">
              <strong>${v.producto}</strong> · ${v.marca}<br>
              <span class="badge-chi">S/ ${v.precio}</span> · ${v.pago}
              ${obsHtml}
            </div>
            ${v.imagen ? `<img src="${v.imagen}" class="venta-img-preview" style="width:50px; height:50px; border-radius:15px; object-fit:cover;">` : '<i class="fas fa-camera" style="color:#ffb7cb; font-size:1.4rem;"></i>'}
          `;
          ventasDiv.appendChild(item);
        });
      } else ventasDiv.innerHTML = '<div class="no-data" style="padding:10px;">Sin ventas</div>';
      header.addEventListener("click", (e) => {
        if (e.target.closest('.delete-cierre-btn')) return;
        ventasDiv.classList.toggle("mostrar");
        icon.classList.toggle("rotated");
      });
      deleteBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        if (confirm(`¿Eliminar permanentemente el cierre del ${fechaDisplay}?`)) {
          await deleteDoc(doc(db, "cierres", cierre.id));
          allCierres = allCierres.filter(c => c.id !== cierre.id);
          aplicarFiltro();
        }
      });
      cont.appendChild(div);
    });
  }

  function filtrarHistorial() { aplicarFiltro(); }
  function resetFiltroHistorial() { document.getElementById("filtroFecha").value = ""; aplicarFiltro(); }
  function toggleHistorial() {
    const panel = document.getElementById("historialPanel");
    if (panel.style.display === "none") {
      panel.style.display = "block";
      historialVisible = true;
      cargarHistorial();
    } else {
      panel.style.display = "none";
      historialVisible = false;
    }
  }

  // ========== CALCULADORA ==========
  let calcExpr = "";
  function abrirCalculadora() { document.getElementById("calcModal").style.display = "flex"; calcExpr = ""; document.getElementById("calcDisplay").innerText = "0"; }
  function cerrarCalculadora() { document.getElementById("calcModal").style.display = "none"; }
  function calcInput(val) { calcExpr += val; document.getElementById("calcDisplay").innerText = calcExpr; }
  function calcClear() { calcExpr = ""; document.getElementById("calcDisplay").innerText = "0"; }
  function calcResult() {
    try {
      let result = eval(calcExpr);
      if (!isFinite(result)) throw new Error();
      result = parseFloat(result.toFixed(10));
      document.getElementById("calcDisplay").innerText = result;
      calcExpr = result.toString();
    } catch(e) { document.getElementById("calcDisplay").innerText = "Error"; calcExpr = ""; }
  }

  // ========== INICIALIZACIÓN ==========
  function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
  function escapeAttr(str) { return str ? str.replace(/"/g, '&quot;') : ''; }
  document.getElementById("foto").addEventListener("change", e => document.getElementById("nombreFoto").innerText = e.target.files[0] ? "📸 lista" : "ninguna");
  document.getElementById("fechaHoy").innerHTML = getPeruDateVisible();
  const frases = ["💖 Cada venta es un latido NAMORE", "🐶 Chiguaguas ❤️ moda", "✨ Brilla como diamante", "🌸 Hecho con dulzura", "🐾 Patitas de la suerte"];
  let idx = 0;
  setInterval(() => { idx = (idx+1)%frases.length; document.getElementById("fraseBonita").innerHTML = frases[idx]; }, 4000);
  document.getElementById("precio").addEventListener("keypress", e => { if(e.key==='Enter') agregarVenta(); });
  document.getElementById("producto").addEventListener("keypress", e => { if(e.key==='Enter') agregarVenta(); });

  window.agregarVenta = agregarVenta;
  window.borrarTodo = borrarTodo;
  window.cerrarTienda = cerrarTienda;
  window.generarPDF = generarPDF;
  window.toggleHistorial = toggleHistorial;
  window.filtrarHistorial = filtrarHistorial;
  window.resetFiltroHistorial = resetFiltroHistorial;
  window.abrirCalculadora = abrirCalculadora;
  window.cerrarCalculadora = cerrarCalculadora;
  window.calcInput = calcInput;
  window.calcClear = calcClear;
  window.calcResult = calcResult;

  cargarVentas();
</script>
</body>
</html>
